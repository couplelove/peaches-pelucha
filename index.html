<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Peaches & Pelucha</title>
  <meta name="description" content="Our Phase 10 scoreboard, love-currency wallet, and bets." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#faf5ef" />
  <link rel="icon" type="image/png" href="icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Peaches & Pelucha" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Type: Fraunces (display serif) + Inter (UI sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://esm.sh" crossorigin />
  <script src="config.js"></script>
</head>
<body>
  <div id="app">
    <div class="boot">
      <div class="boot-heart">💗</div>
      <div class="boot-text">Peaches &amp; Pelucha</div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
  <script>
    // Register the service worker so the app installs to the home screen.
    // Register the SW everywhere except localhost, where its caching gets in the
    // way of seeing edits during development.
    var isLocal = ["localhost", "127.0.0.1"].includes(location.hostname);
    if ("serviceWorker" in navigator && !isLocal) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
