name: Deploy to GitHub Pages

# Auto-deploys the site on every push to main. The Supabase key is NOT in the
# repo — it's injected here from the repo Secrets SUPABASE_URL and
# SUPABASE_ANON_KEY, so the published page still auto-connects.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write config.js from secrets
        run: |
          cat > config.js <<EOF
          window.PP_CONFIG = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}",
          };
          EOF
          echo "Wrote config.js (URL present: ${{ secrets.SUPABASE_URL != '' }})"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # turns on Pages automatically on first run

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
