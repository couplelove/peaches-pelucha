<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <!-- passcode-gated, but also keep it out of search results -->
  <meta name="robots" content="noindex, nofollow" />
  <title>Peaches &amp; Pelucha — our memories</title>
  <link rel="icon" type="image/png" href="icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://esm.sh" crossorigin />

  <style>
    /* family page is its own little site — reuses the design tokens + gallery
       classes from styles.css, with a few page-specific bits here. */
    .fam-wrap { max-width: var(--maxw); margin: 0 auto; padding: calc(20px + var(--safe-top)) 16px calc(40px + var(--safe-bottom)); }
    .fam-mast { text-align: center; padding: 18px 0 22px; }
    .fam-mast .heart { font-size: 30px; }
    .fam-mast h1 { font-family: var(--serif); font-weight: 500; font-size: 30px; letter-spacing: -0.01em; margin: 8px 0 2px; }
    .fam-mast p { color: var(--ink-2); margin: 0; font-size: 14px; }
    .fam-rule { height: 1px; background: var(--line); margin: 4px 0 20px; }

    /* passcode gate */
    .fam-gate { min-height: 86dvh; display: grid; place-content: center; text-align: center; gap: 14px; }
    .fam-gate .heart { font-size: 40px; animation: rise 1.4s ease-in-out infinite; }
    .fam-gate h1 { font-family: var(--serif); font-weight: 500; font-size: 26px; margin: 0; }
    .fam-gate p { color: var(--ink-2); margin: -4px 0 6px; font-size: 14px; }
    .fam-gate form { display: flex; gap: 8px; justify-content: center; }
    .fam-gate input { font-size: 16px; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--r-sm);
      background: var(--surface); color: var(--ink); width: 200px; font-family: var(--sans); }
    .fam-gate .err { color: var(--bad); font-size: 13px; min-height: 16px; margin: 0; }

    .fam-end { text-align: center; color: var(--ink-3); font-size: 13px; padding: 26px 0 8px; font-family: var(--serif); }
    .fam-spin { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--line); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* lightbox — simple, read-only */
    .fam-lb { position: fixed; inset: 0; z-index: 9000; background: rgba(20,18,16,.96);
      display: grid; place-content: center; touch-action: none; }
    .fam-lb-media { max-width: 100vw; max-height: 86dvh; }
    .fam-lb img, .fam-lb video { max-width: 100vw; max-height: 86dvh; display: block; object-fit: contain; }
    .fam-lb-x, .fam-lb-nav { position: absolute; background: rgba(255,255,255,.14); color: #fff; border: 0;
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); border-radius: 50%; cursor: pointer;
      width: 44px; height: 44px; font-size: 20px; display: grid; place-content: center; }
    .fam-lb-x { top: calc(14px + var(--safe-top)); right: 14px; }
    .fam-lb-nav.prev { left: 10px; top: 50%; transform: translateY(-50%); }
    .fam-lb-nav.next { right: 10px; top: 50%; transform: translateY(-50%); }
    .fam-lb-nav:disabled { opacity: .25; }
    .fam-lb-meta { position: absolute; bottom: calc(16px + var(--safe-bottom)); left: 0; right: 0; text-align: center;
      color: rgba(255,255,255,.85); font-size: 13px; }
  </style>
</head>
<body>
  <div id="fam"><div class="fam-gate"><div class="heart">💗</div><div class="boot-text">…</div></div></div>
  <script type="module" src="family.js"></script>
</body>
</html>
