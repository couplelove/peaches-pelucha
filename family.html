<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <!-- passcode-gated, but also keep it out of search results -->
  <meta name="robots" content="noindex, nofollow" />
  <title>Peaches &amp; Pelucha — our memories</title>
  <link rel="icon" type="image/png" href="icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://esm.sh" crossorigin />

  <style>
    /* family page is its own little site — reuses the design tokens + gallery
       classes from styles.css, with a few page-specific bits here. */
    .fam-wrap { max-width: var(--maxw); margin: 0 auto; padding: calc(20px + var(--safe-top)) 16px calc(40px + var(--safe-bottom)); }
    .fam-mast { text-align: center; padding: 18px 0 22px; }
    .fam-mast .heart { font-size: 30px; }
    .fam-mast h1 { font-family: var(--serif); font-weight: 500; font-size: 30px; letter-spacing: -0.01em; margin: 8px 0 2px; }
    .fam-mast p { color: var(--ink-2); margin: 0; font-size: 14px; }
    .fam-rule { height: 1px; background: var(--line); margin: 4px 0 20px; }

    /* passcode gate */
    .fam-gate { min-height: 86dvh; display: grid; place-content: center; text-align: center; gap: 14px; }
    .fam-gate .heart { font-size: 40px; animation: rise 1.4s ease-in-out infinite; }
    .fam-gate h1 { font-family: var(--serif); font-weight: 500; font-size: 26px; margin: 0; }
    .fam-gate p { color: var(--ink-2); margin: -4px 0 6px; font-size: 14px; }
    .fam-gate form { display: flex; gap: 8px; justify-content: center; }
    .fam-gate input { font-size: 16px; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--r-sm);
      background: var(--surface); color: var(--ink); width: 200px; font-family: var(--sans); }
    .fam-gate .err { color: var(--bad); font-size: 13px; min-height: 16px; margin: 0; }

    .fam-end { text-align: center; color: var(--ink-3); font-size: 13px; padding: 26px 0 8px; font-family: var(--serif); }
    .fam-spin { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--line); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* lightbox — simple, read-only */
    .fam-lb { position: fixed; inset: 0; z-index: 9000; background: rgba(20,18,16,.96);
      display: flex; flex-direction: column; touch-action: none; }
    .fam-lb-stage { flex: 1 1 auto; min-height: 0; display: grid; place-content: center; padding: 0 6px; }
    .fam-lb-media { max-width: 100vw; max-height: 100%; }
    .fam-lb-stage img, .fam-lb-stage video { max-width: 100vw; max-height: 100%; display: block; object-fit: contain; }
    .fam-lb-x, .fam-lb-nav { position: absolute; background: rgba(255,255,255,.14); color: #fff; border: 0;
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); border-radius: 50%; cursor: pointer;
      width: 44px; height: 44px; font-size: 20px; display: grid; place-content: center; z-index: 2; }
    .fam-lb-x { top: calc(14px + var(--safe-top)); right: 14px; }
    .fam-lb-nav.prev { left: 10px; top: 42%; transform: translateY(-50%); }
    .fam-lb-nav.next { right: 10px; top: 42%; transform: translateY(-50%); }
    .fam-lb-nav:disabled { opacity: .25; }
    .fam-lb-meta { flex: 0 0 auto; text-align: center; color: rgba(255,255,255,.7); font-size: 12.5px; padding: 8px 0 4px; }
    /* Gramma's comment panel at the foot of the lightbox */
    .fam-com { flex: 0 0 auto; background: var(--paper); border-radius: 18px 18px 0 0; padding: 10px 14px calc(10px + var(--safe-bottom));
      max-height: 38dvh; overflow-y: auto; box-shadow: 0 -14px 36px rgba(0,0,0,.4); }
    .fam-com-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 9px; }
    .fam-com-row { font-size: 14px; color: var(--ink); background: var(--paper-2); border-radius: 12px; padding: 7px 11px; }
    .fam-com-row b { font-weight: 600; }
    .fam-com-bar { display: flex; gap: 7px; align-items: center; }
    .fam-com-name { width: 96px; flex: 0 0 auto; }
    .fam-com-bar input { font-size: 16px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 999px;
      background: var(--surface); color: var(--ink); font-family: var(--sans); }
    .fam-com-input { flex: 1 1 auto; min-width: 0; }
    .fam-com-send { flex: 0 0 auto; border: 0; background: var(--accent); color: #fff; font-size: 18px;
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer; }
    .fam-com-send:disabled { opacity: .4; }
    /* heartfelt notes from the couple at the top of the feed */
    .fam-notes { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
    .fam-note { display: flex; gap: 12px; align-items: stretch; background: linear-gradient(165deg, color-mix(in srgb, var(--accent) 14%, var(--surface)), var(--surface) 75%);
      border: 1px solid color-mix(in srgb, var(--accent) 26%, var(--line)); border-radius: 16px; padding: 12px; }
    .fam-note-img { width: 96px; height: 120px; object-fit: cover; border-radius: 11px; flex: 0 0 auto; }
    .fam-note-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .fam-note-eyebrow { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent-press); font-weight: 700; margin-bottom: 5px; }
    .fam-note-text { font-family: var(--serif); font-weight: 500; font-size: 16px; line-height: 1.4; color: var(--ink); margin: 0; }
  </style>
</head>
<body>
  <div id="fam"><div class="fam-gate"><div class="heart">💗</div><div class="boot-text">…</div></div></div>
  <script type="module" src="family.js"></script>
</body>
</html>
